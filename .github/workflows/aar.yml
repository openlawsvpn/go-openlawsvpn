name: Build AAR

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the release (e.g. v0.1.0)'
        required: true

jobs:
  build-aar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build AAR
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125
        run: |
          gomobile bind -v \
            -o go-openvpn3.aar \
            -target android \
            -androidapi 26 \
            -ldflags "-X github.com/openlawsvpn/go-openvpn3.Version=${{ steps.version.outputs.tag }}" \
            github.com/openlawsvpn/go-openvpn3

      - name: Compute SHA-256
        run: sha256sum go-openvpn3.aar > go-openvpn3.aar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "go-openvpn3 ${{ steps.version.outputs.tag }}"
          body: |
            Pure-Go OpenVPN3 client library for Android.

            ## Consuming this release

            In `app/libs/`, add `go-openvpn3.aar`, then in `build.gradle.kts`:
            ```kotlin
            implementation(files("libs/go-openvpn3.aar"))
            ```

            Verify the download:
            ```
            sha256sum -c go-openvpn3.aar.sha256
            ```
          files: |
            go-openvpn3.aar
            go-openvpn3.aar.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
