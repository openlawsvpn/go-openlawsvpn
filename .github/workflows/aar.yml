name: Build AAR

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag for the release (e.g. v0.1.0)'
        required: true

jobs:
  build-aar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@$(go list -m -f '{{.Version}}' golang.org/x/mobile)
          gomobile init

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build AAR
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/30.0.14904198
        run: |
          gomobile bind -v \
            -o go-openlawsvpn.aar \
            -target android \
            -androidapi 31 \
            -ldflags "-X github.com/openlawsvpn/go-openlawsvpn.Version=${{ steps.version.outputs.tag }}" \
            github.com/openlawsvpn/go-openlawsvpn

      - name: Compute SHA-256
        run: sha256sum go-openlawsvpn.aar > go-openlawsvpn.aar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "go-openlawsvpn ${{ steps.version.outputs.tag }}"
          body: |
            Pure-Go OpenVPN3 client library for Android.

            ## Consuming this release

            In `app/libs/`, add `go-openlawsvpn.aar`, then in `build.gradle.kts`:
            ```kotlin
            implementation(files("libs/go-openlawsvpn.aar"))
            ```

            Verify the download:
            ```
            sha256sum -c go-openlawsvpn.aar.sha256
            ```
          files: |
            go-openlawsvpn.aar
            go-openlawsvpn.aar.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-android-go:
    needs: build-aar
    if: github.event_name == 'push'
    uses: openlawsvpn/openlawsvpn-android-go/.github/workflows/bump-aar.yml@main
    with:
      version: ${{ needs.build-aar.outputs.tag }}
    secrets:
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
