name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

  cli-integration:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir -p bin
          go build -o bin/mock-server ./mock/mockserver
          CGO_ENABLED=0 go build -o bin/openlawsvpn-cli ./cmd/cli

      - name: Run CLI integration test
        run: bash scripts/cli-integration.sh
        env:
          CLI_BIN: bin/openlawsvpn-cli
          MOCK_BIN: bin/mock-server
          SUDO: sudo

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-integration-logs-${{ matrix.os }}
          path: tmp/openlawsvpn-cli.*.log
          if-no-files-found: ignore
