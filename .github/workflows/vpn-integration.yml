name: VPN Integration

# Runs the relay agent in CI mode, waits for the tunnel to come up, then
# verifies connectivity to an internal service via the VPN.
#
# Requires these repository secrets:
#   RELAY_TOKEN        — org token registered in relay-organisations DynamoDB table
#   INTERNAL_HEALTH_URL — URL of an internal service to verify VPN connectivity (e.g. http://10.x.x.x:port/healthz)
#
# The mobile/desktop app (or any operator with the org token) must approve the
# connection in the relay app UI within ~5 minutes of the job starting.
# In practice, automate approval via the relay API from another step or a
# separate tool.

on:
  workflow_dispatch:   # manual trigger
  # Uncomment to run on every push to main:
  # push:
  #   branches: [main]

jobs:
  vpn-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build openlawsvpn-cli
        run: CGO_ENABLED=0 go build -o /usr/local/bin/openlawsvpn-cli ./cmd/cli

      - name: Start relay agent (blocks until tunnel is up, then daemonizes)
        timeout-minutes: 10
        env:
          RELAY_TOKEN: ${{ secrets.RELAY_TOKEN }}
        run: |
          sudo -E openlawsvpn-cli \
            -relay "$RELAY_TOKEN" \
            -daemon \
            -pidfile /tmp/openlawsvpn-cli.pid \
            -logfile /tmp/openlawsvpn-cli.log
          echo "Tunnel is up (daemon pid $(cat /tmp/openlawsvpn-cli.pid))"

      - name: Check internal service health
        env:
          HEALTH_URL: ${{ secrets.INTERNAL_HEALTH_URL }}
        run: |
          echo "Testing connectivity to internal service..."
          response=$(curl -si --max-time 10 "$HEALTH_URL")
          echo "$response"

          # Assert HTTP 200
          if ! echo "$response" | grep -q "HTTP/1.1 200 OK"; then
            echo "ERROR: expected HTTP 200, got:"
            echo "$response"
            exit 1
          fi

          # Assert {"status":"ok"}
          if ! echo "$response" | grep -q '"status":"ok"'; then
            echo "ERROR: expected {\"status\":\"ok\"} in body"
            exit 1
          fi

          echo "Health check passed"

      - name: Disconnect VPN
        if: always()
        run: |
          if [ -f /tmp/openlawsvpn-cli.pid ]; then
            sudo kill "$(cat /tmp/openlawsvpn-cli.pid)" 2>/dev/null || true
          fi

      - name: Upload relay agent log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openlawsvpn-cli-log
          path: /tmp/openlawsvpn-cli.log
          if-no-files-found: ignore
