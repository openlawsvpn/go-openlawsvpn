repos:
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-unit-tests
        args: [-race]

  - repo: local
    hooks:
      - id: rpmlint
        name: rpmlint spec
        language: system
        entry: rpmlint --strict packaging/openlawsvpn.spec
        pass_filenames: false
        files: ^packaging/.*\.spec$

      - id: cross-platform-build
        name: cross-platform build (linux/android/ios/darwin)
        language: system
        entry: make check-platforms
        pass_filenames: false
        files: \.go$
