<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- The daemon process owns this name on the system bus. -->
  <policy user="openlawsvpn">
    <allow own="com.openlawsvpn.Daemon"/>
  </policy>

  <!-- Any logged-in user may call the daemon and receive its signals. -->
  <policy group="openlawsvpn">
    <allow send_destination="com.openlawsvpn.Daemon"/>
    <allow receive_sender="com.openlawsvpn.Daemon"/>
  </policy>
</busconfig>
