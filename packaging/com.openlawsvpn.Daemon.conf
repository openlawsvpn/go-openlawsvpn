<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- The daemon process owns this name on the system bus. -->
  <policy user="openlawsvpn">
    <allow own="com.openlawsvpn.Daemon"/>
  </policy>

  <!-- Any member of the openlawsvpn group may call and receive signals. -->
  <policy group="openlawsvpn">
    <allow send_destination="com.openlawsvpn.Daemon"
           send_interface="com.openlawsvpn.Daemon"/>
    <allow send_destination="com.openlawsvpn.Daemon"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="com.openlawsvpn.Daemon"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow receive_sender="com.openlawsvpn.Daemon"/>
  </policy>

  <!-- Allow all local users (at_console) as a fallback. -->
  <policy at_console="true">
    <allow send_destination="com.openlawsvpn.Daemon"
           send_interface="com.openlawsvpn.Daemon"/>
    <allow receive_sender="com.openlawsvpn.Daemon"/>
  </policy>
</busconfig>
